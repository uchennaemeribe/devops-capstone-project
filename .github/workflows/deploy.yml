name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🐳 Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🔐 Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🏗️ Build & Push Docker Image (FIXED PATH)
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app ./devops-app
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-app

      # 🚀 Deploy to EC2 via SSH
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Pull latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

            # Stop and remove old container (safe)
            docker stop app || true
            docker rm app || true

            # Run new container
            docker run -d -p 80:3000 --name app --restart always ${{ secrets.DOCKER_USERNAME }}/devops-app:latest